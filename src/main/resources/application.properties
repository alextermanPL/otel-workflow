quarkus.http.port=9090

# Temporal
quarkus.temporal.connection.target=localhost:7233
quarkus.temporal.namespace=default
quarkus.temporal.start-workers=true

# Payment API REST client
quarkus.rest-client.payment-api.url=http://localhost:8089

# Kafka (Redpanda) — external port 19092 for app running on host via quarkusDev
kafka.bootstrap.servers=localhost:19092

mp.messaging.outgoing.fraud-check-commands.connector=smallrye-kafka
mp.messaging.outgoing.fraud-check-commands.topic=fraud-check-commands
mp.messaging.outgoing.fraud-check-commands.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.incoming.fraud-check-results.connector=smallrye-kafka
mp.messaging.incoming.fraud-check-results.topic=fraud-check-results
mp.messaging.incoming.fraud-check-results.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.fraud-check-results.group.id=payment-workflow-fraud
mp.messaging.incoming.fraud-check-results.client.id=fraud-check-consumer-instance
mp.messaging.incoming.fraud-check-results.auto.offset.reset=latest

# OpenTelemetry
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.application.name=payment-workflow
quarkus.otel.resource.attributes=service.version=1.0.0
quarkus.otel.propagators=tracecontext,baggage
quarkus.http.port=9090

# Temporal
quarkus.temporal.connection.target=localhost:7233
quarkus.temporal.namespace=default
quarkus.temporal.start-workers=true

# Payment API REST client
quarkus.rest-client.payment-api.url=http://localhost:8089

# OpenTelemetry
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.exporter.otlp.protocol=grpc
quarkus.application.name=payment-workflow
quarkus.otel.resource.attributes=service.version=1.0.0
quarkus.otel.propagators=tracecontext,baggage